<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="theme-color" content="#1d4ed8">
  <meta name="mobile-web-app-capable" content="yes">

  <title>VU35KB HT Web Program Tool</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap');
    :root {
      --bg:#f4f6fb;--card:#fff;--border:#e4e9f2;--text:#111827;--muted:#6b7280;
      --primary:#1d4ed8;--primary-hover:#1e40af;--accent:#0d9488;--accent-soft:#ecfdf5;
      --vhf:#059669;--uhf:#d97706;--warn:#b45309;--danger:#dc2626;
      --radius:16px;--shadow:0 1px 2px rgba(17,24,39,.04),0 8px 24px rgba(17,24,39,.06);
      --sidebar-w:248px;--detail-w:360px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',Inter,system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}
    body.sidebar-open,body.panel-open{overflow:hidden;touch-action:none}
    button,input,select,textarea{font:inherit}
    button{cursor:pointer;border:none;border-radius:12px;padding:.6rem 1rem;font-weight:600;transition:background .15s,transform .1s,box-shadow .15s}
    button:active:not(:disabled){transform:scale(.98)}
    .btn-primary{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(29,78,216,.25)}
    .btn-primary:hover:not(:disabled){background:var(--primary-hover)}

    .btn-accent:hover{background:#0f766e}
    .btn-danger{background:#fef2f2;color:var(--danger);border:1px solid #fecaca}
    .app-frame{display:flex;flex-direction:column;min-height:100vh}
    .top-header{background:var(--card);border-bottom:1px solid var(--border);padding:.85rem 1.5rem;padding-top:max(.85rem, env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;gap:.75rem;position:sticky;top:0;z-index:20}
    .top-header-actions{display:flex;align-items:center;gap:.5rem;flex-shrink:0}
    .menu-toggle{display:none;width:44px;height:44px;border-radius:12px;border:1px solid var(--border);background:var(--card);font-size:1.25rem;line-height:1;color:var(--text);flex-shrink:0}
    .top-brand{display:flex;align-items:center;gap:.75rem;min-width:0}

    .shell{display:grid;grid-template-columns:var(--sidebar-w) 1fr;flex:1;min-height:0;position:relative;transition:grid-template-columns .2s ease}

    .shell.panel-open .detail-panel{display:flex}

    @media(min-width:901px){
      .panel-backdrop{display:none!important}
    }
    @media(max-width:900px){
      .shell,.shell.panel-open{grid-template-columns:1fr}
      .shell.panel-open .detail-panel:not(.open){display:none}
      .detail-panel.open{display:flex!important;position:fixed;left:0;right:0;bottom:0;top:auto;width:100%;max-height:min(92dvh, calc(100dvh - env(safe-area-inset-top)));z-index:60;border-radius:20px 20px 0 0;box-shadow:0 -8px 32px rgba(17,24,39,.18);transform:translateY(105%);transition:transform .28s ease;padding-bottom:env(safe-area-inset-bottom);border-left:none}

      .top-header{padding:.65rem .85rem;padding-top:max(.65rem, env(safe-area-inset-top))}

      .status-pill .status-text-short{display:none}

  <script>
/* VU35KB HT Web Program Tool */
'use strict';

const APP_NAME = 'VU35KB HT Web Program Tool';
const APP_CALLSIGN = 'VU35KB';

const DTCS_CODES = [23,25,26,31,32,43,47,51,54,65,71,72,73,74,114,115,116,125,131,132,134,143,152,155,156,162,165,172,174,205,223,226,243,244,245,251,261,263,265,271,306,311,315,331,343,346,351,364,365,371,411,412,413,423,431,432,445,464,465,466,503,506,516,532,546,565,606,612,624,627,631,632,654,662,664,703,712,723,731,732,734,743,754,212,225,241,246,252,255,261,263,265,266,271,306,311,315,331,343,346,351,364,365,371,411,412,413,423,431,432,445,464,465,466,503,506,516,532,546,565,606,612,624,627,631,645];

const MODELS = {
  uv5r: { id:'uv5r', name:'UV-5R', family:'uv5r', channels:128, nameLen:7, baud:9600, powers:['High','Low'], ext:'.img' },
  f8hp: { id:'f8hp', name:'BF-F8HP', family:'uv5r', channels:128, nameLen:7, baud:9600, triPower:true, powers:['High','Mid','Low'], ext:'.img' },
  uv82: { id:'uv82', name:'UV-82', family:'uv5r', channels:128, nameLen:7, baud:9600, powers:['High','Low'], ext:'.img', magic:'uv82' },
  uv13: { id:'uv13', name:'UV-13 Pro / M13 Pro', family:'uv17', channels:999, nameLen:11, baud:57600, powers:['High','Low'], ext:'.data' },
  mini: { id:'mini', name:'UV-5R Mini', family:'uv17pro', channels:999, nameLen:12, baud:115200, powers:['High','Low'], ext:'.data' },
};

const UV5R_MAGIC = {
  default: [0x50,0xBB,0xFF,0x20,0x12,0x07,0x25],
  orig: [0x50,0xBB,0xFF,0x01,0x25,0x98,0x4D],
  uv82: [0x50,0xBB,0xFF,0x20,0x13,0x01,0x05],
};

const state = {
  model: MODELS.uv5r,
  connected: false,
  serial: null,
  image: null,
  channels: [],
  settings: {},
  backupAt: null,
  view: 'cards',
  filter: '',
  filterMode: 'all',
  page: 0,
  pageSize: 48,
  selected: new Set(),
  detailCh: null,
  progress: null,
  licenseGrade: 'general',
  showFreqMap: true,
  sidebarOpen: false,
};

function serialSupported() { return 'serial' in navigator; }
function isMobileLayout() { return window.matchMedia('(max-width: 900px)').matches; }
function isNarrowLayout() { return window.matchMedia('(max-width: 600px)').matches; }
function layoutPageSize() {
  if (window.matchMedia('(max-width: 480px)').matches) return 24;
  if (window.matchMedia('(max-width: 900px)').matches) return 36;
  return 48;
}
function openSidebar() {
  state.sidebarOpen = true;
  $('sidebar')?.classList.add('open');
  $('sidebar-backdrop')?.classList.add('visible');
  $('menu-toggle')?.setAttribute('aria-expanded', 'true');
  document.body.classList.add('sidebar-open');
}
function closeSidebar() {
  state.sidebarOpen = false;
  $('sidebar')?.classList.remove('open');
  $('sidebar-backdrop')?.classList.remove('visible');
  $('menu-toggle')?.setAttribute('aria-expanded', 'false');
  document.body.classList.remove('sidebar-open');
}
function toggleSidebar() {
  state.sidebarOpen ? closeSidebar() : openSidebar();
}
function closeSidebarOnMobile() { if (isMobileLayout()) closeSidebar(); }
function openDetailPanel() {
  $('app')?.classList.add('panel-open');
  $('detail')?.classList.add('open');
  if (isMobileLayout()) {
    $('panel-backdrop')?.classList.add('visible');
    document.body.classList.add('panel-open');
    closeSidebar();
  }
}
function bindLayoutChrome() {
  $('menu-toggle')?.addEventListener('click', toggleSidebar);
  $('sidebar-backdrop')?.addEventListener('click', closeSidebar);
  $('panel-backdrop')?.addEventListener('click', closePanel);
  $('detail')?.addEventListener('click', e => {
    if (e.target.closest('[data-panel-close]')) {
      e.preventDefault();
      closePanel();
    }
  });
  if (!window._layoutBound) {
    window._layoutBound = true;
    window.addEventListener('resize', () => {
      if (!isMobileLayout()) {
        closeSidebar();
        $('panel-backdrop')?.classList.remove('visible');
        document.body.classList.remove('panel-open');
      } else if (state.sidebarOpen) openSidebar();
      if (state.detailCh != null) openDetailPanel();
      renderMain();
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && state.detailCh != null) closePanel();
    });
  }
}

// ─── India band plan (HT-relevant segments) ───────────────────
const INDIA_HAM_TX_BANDS = [
  { id: '2m', name: '2 m', lo: 144e6, hi: 146e6, type: 'VHF' },
  { id: '70cm', name: '70 cm', lo: 434e6, hi: 438e6, type: 'UHF' },
];
const HT_RX_RANGES = [
  { name: 'FM broadcast', lo: 65e6, hi: 108e6, tx: false },
  { name: 'Airband', lo: 108e6, hi: 136e6, tx: false },
  { name: 'VHF', lo: 136e6, hi: 174e6, tx: 'partial' },
  { name: '220 MHz', lo: 220e6, hi: 260e6, tx: false },
  { name: 'UHF', lo: 400e6, hi: 520e6, tx: 'partial' },
];
const BACKUP_KEY = 'vu35kb_backup_history';
const MAX_BACKUPS = 10;

function getTxFreq(ch) {
  if (ch.empty || ch.duplex === 'off') return 0;
  if (ch.duplex === 'split') return ch.offset;
  if (ch.duplex === '+') return ch.freq + ch.offset;
  if (ch.duplex === '-') return ch.freq - ch.offset;
  return ch.freq;
}

function validateChannelIndia(ch) {
  if (ch.empty) return { level: 'ok', msg: '' };
  const tx = getTxFreq(ch);
  if (!tx) return { level: 'rx', msg: 'RX only — no transmit' };
  for (const b of INDIA_HAM_TX_BANDS) {
    if (tx >= b.lo && tx <= b.hi) return { level: 'ok', msg: `TX in India ${b.name} ham band` };
  }
  if (tx >= 136e6 && tx <= 174e6) return { level: 'error', msg: 'TX outside India 2 m (144–146 MHz)' };
  if (tx >= 400e6 && tx <= 520e6) return { level: 'error', msg: 'TX outside India 70 cm (434–438 MHz)' };
  return { level: 'error', msg: 'TX not in recognised India amateur HT segment' };
}

function channelIssuesSummary() {
  const issues = state.channels.filter(c => !c.empty).map(c => ({ ch: c, v: validateChannelIndia(c) }))
    .filter(x => x.v.level === 'error' || x.v.level === 'warn');
  const errors = issues.filter(x => x.v.level === 'error').length;
  const warns = issues.filter(x => x.v.level === 'warn').length;
  return { issues, errors, warns };
}

function findFreqCollisions() {
  const map = new Map();
  const collisions = [];
  for (const c of state.channels.filter(x => !x.empty)) {
    const k = Math.round(c.freq / 6250);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(c);
  }
  for (const [, arr] of map) if (arr.length > 1) collisions.push(arr);
  return collisions;
}

// ─── Backup timeline ─────────────────────────────────────────
function uint8ToB64(u8) {
  let bin = '';
  for (let i = 0; i < u8.length; i++) bin += String.fromCharCode(u8[i]);
  return btoa(bin);
}
function b64ToUint8(b64) {
  const bin = atob(b64);
  const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}

function loadBackupList() {
  try { return JSON.parse(localStorage.getItem(BACKUP_KEY) || '[]'); } catch { return []; }
}

function saveBackupSnapshot(label) {
  if (!state.channels.length) return;
  syncChannelsToImage();
  const entry = {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
    ts: Date.now(),
    modelId: state.model.id,
    modelName: state.model.name,
    label: label || 'Snapshot',
    channels: JSON.parse(JSON.stringify(state.channels)),
    settings: JSON.parse(JSON.stringify(state.settings || {})),
    imageB64: state.image ? uint8ToB64(state.image) : null,
  };
  let list = loadBackupList();
  list.unshift(entry);
  if (list.length > MAX_BACKUPS) list = list.slice(0, MAX_BACKUPS);
  localStorage.setItem(BACKUP_KEY, JSON.stringify(list));
  return entry.id;
}

function restoreBackup(id) {
  const entry = loadBackupList().find(b => b.id === id);
  if (!entry) return toast('Backup not found', 'error');
  if (entry.modelId !== state.model.id && !confirm(`Backup is for ${entry.modelName}. Restore anyway?`)) return;
  state.model = MODELS[entry.modelId] || state.model;
  state.channels = entry.channels;
  state.settings = entry.settings || {};
  if (entry.imageB64) state.image = b64ToUint8(entry.imageB64);
  else syncChannelsToImage();
  state.backupAt = new Date(entry.ts);
  toast('Backup restored', 'success');
  closePanel();
  render();
}

function diffChannelSnapshots(a, b) {
  const changes = [];
  const len = Math.max(a?.length || 0, b?.length || 0);
  for (let i = 0; i < len; i++) {
    const ca = a[i], cb = b[i];
    if (!ca || !cb) continue;
    const sa = JSON.stringify(ca), sb = JSON.stringify(cb);
    if (sa !== sb) {
      const parts = [];
      if (ca.empty !== cb.empty) parts.push(cb.empty ? 'cleared' : 'programmed');
      if (ca.name !== cb.name) parts.push(`name "${ca.name||'—'}" → "${cb.name||'—'}"`);
      if (ca.freq !== cb.freq) parts.push(`RX ${freqMHz(ca.freq)} → ${freqMHz(cb.freq)} MHz`);
      if (ca.duplex !== cb.duplex || ca.offset !== cb.offset) parts.push('duplex/offset changed');
      changes.push({ number: ca.number ?? i, summary: parts.join('; ') || 'fields changed' });
    }
  }
  return changes;
}

function bootLcdInner(line1, line2, maxLen) {
  const pad = (s, n) => (s || '').slice(0, n).padEnd(n, ' ');
  const l1 = pad(line1, maxLen);
  const l2 = pad(line2, maxLen);
  return `<div class="lcd-screen">
      <div class="lcd-line">${esc(l1).replace(/ /g, '·')}</div>
      <div class="lcd-line">${esc(l2).replace(/ /g, '·')}</div>
    </div>
    <p class="hint lcd-hint">${maxLen} characters per line · dots = spaces</p>`;
}

function renderBootLcdPreview(line1, line2, maxLen) {
  return `<div class="lcd-preview" aria-label="Power-on message preview">${bootLcdInner(line1, line2, maxLen)}</div>`;
}

function bindBootPreview(maxLen) {
  const upd = () => {
    const el = $('lcd-live');
    if (!el) return;
    el.innerHTML = bootLcdInner($('s-b1')?.value || '', $('s-b2')?.value || '', maxLen);
  };
  $('s-b1')?.addEventListener('input', upd);
  $('s-b2')?.addEventListener('input', upd);
}

function renderFreqMap() {
  const programmed = state.channels.filter(c => !c.empty);
  if (!programmed.length) return '';
  const segments = [
    { id: 'vhf', label: 'VHF 136 – 174 MHz', lo: 136e6, hi: 174e6, ham: [144e6, 146e6], color: 'var(--vhf)' },
    { id: 'uhf', label: 'UHF 400 – 470 MHz', lo: 400e6, hi: 470e6, ham: [434e6, 438e6], color: 'var(--uhf)' },
  ];
  const collisions = findFreqCollisions();
  let html = `<section class="freq-map-card"><div class="freq-map-head"><strong>Frequency map</strong><span class="hint">${programmed.length} channels · click a dot to edit</span></div>`;
  for (const seg of segments) {
    const hamL = ((seg.ham[0] - seg.lo) / (seg.hi - seg.lo)) * 100;
    const hamW = ((seg.ham[1] - seg.ham[0]) / (seg.hi - seg.lo)) * 100;
    html += `<div class="freq-seg-label">${seg.label}</div><div class="freq-track" data-seg="${seg.id}">`;
    html += `<div class="freq-ham-zone" style="left:${hamL}%;width:${hamW}%"></div>`;
    for (const c of programmed) {
      if (c.freq < seg.lo || c.freq > seg.hi) continue;
      const pct = ((c.freq - seg.lo) / (seg.hi - seg.lo)) * 100;
      const v = validateChannelIndia(c);
      const cls = v.level === 'error' ? 'dot-bad' : v.level === 'warn' ? 'dot-warn' : v.level === 'rx' ? 'dot-rx' : 'dot-ok';
      html += `<button type="button" class="freq-dot ${cls}" style="left:${pct}%;transform:translate(-50%,-50%)" data-n="${c.number}" title="CH ${c.number} ${freqMHz(c.freq)} MHz — ${v.msg}"></button>`;
    }
    html += `</div>`;
  }
  if (collisions.length) {
    html += `<p class="freq-collision warn-banner" style="margin-top:.75rem;margin-bottom:0"><span>⚠</span><span><strong>${collisions.length} duplicate RX frequency</strong> — channels share the same frequency.</span></p>`;
  }
  html += `<div class="freq-legend"><span><i class="ldot dot-ok"></i> Ham TX OK</span><span><i class="ldot dot-rx"></i> RX only</span><span><i class="ldot dot-warn"></i> Review</span><span><i class="ldot dot-bad"></i> Band issue</span></div></section>`;
  return html;
}

function bindFreqMap() {
  document.querySelectorAll('.freq-dot').forEach(el => {
    el.onclick = () => {
      state.detailCh = +el.dataset.n;
      renderDetail();
      openDetailPanel();
    };
  });
}

function $(id) { return document.getElementById(id); }
function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function toast(msg, type='info') {
  const w = $('toasts');
  const el = document.createElement('div');
  el.className = 'toast toast-' + type;
  el.textContent = msg;
  w.appendChild(el);
  setTimeout(() => el.remove(), 4000);
}
function freqMHz(hz) { return (hz/1e6).toFixed(3).replace(/\.?0+$/,'') || '0'; }
function parseFreqMHz(s) {
  const n = parseFloat(String(s).replace(/[^\d.]/g,''));
  return isNaN(n) ? 0 : Math.round(n * 1e6);
}
function bandOf(hz) {
  if (hz >= 136e6 && hz <= 174e6) return 'VHF';
  if (hz >= 400e6 && hz <= 520e6) return 'UHF';
  if (hz >= 220e6 && hz <= 260e6) return '220';
  return '—';
}

function lbcdDecode(bytes) {
  let s = '';
  for (const b of bytes) {
    s += ((b>>4)&0xf).toString();
    s += (b&0xf).toString();
  }
  return parseInt(s, 10) * 10;
}
function lbcdEncode(hz) {
  let s = String(Math.floor(hz / 10)).padStart(8, '0').slice(-8);
  const out = new Uint8Array(4);
  for (let i = 0; i < 4; i++) out[i] = (parseInt(s[i*2],10)<<4) | parseInt(s[i*2+1],10);
  return out;
}

function emptyChannel(n) {
  return { number:n, empty:true, name:'', freq:0, duplex:'', offset:0, tmode:'', rtone:88.5, ctone:88.5,
    dtcs:23, rx_dtcs:23, power:'High', mode:'FM', skip:'' };
}

// ─── Serial ──────────────────────────────────────────────────
class RadioSerial {
  constructor() { this.port=null; this.reader=null; this.writer=null; this._buf=new Uint8Array(0); }
  get supported() { return 'serial' in navigator; }

  static async getAuthorizedPorts() {
    if (!('serial' in navigator)) return [];
    return navigator.serial.getPorts();
  }

  static portLabel(port, index) {
    const info = port.getInfo?.() || {};
    const v = info.usbVendorId, p = info.usbProductId;
    if (v != null && p != null) {
      const names = { 0x1a86: 'CH340', 0x0403: 'FTDI', 0x067b: 'Prolific', 0x10c4: 'CP210x' };
      const chip = names[v] || 'USB serial';
      return `${chip} (${v.toString(16).padStart(4,'0')}:${p.toString(16).padStart(4,'0')})`;
    }
    return `Authorized cable ${index + 1}`;
  }

  async openPort(port, baud) {
    if (!port) throw new Error('No port selected');
    this.port = port;
    await this.port.open({ baudRate: baud, dataBits: 8, stopBits: 1, parity: 'none', flowControl: 'none' });
    this._buf = new Uint8Array(0);
    this.reader = this.port.readable.getReader();
    this.writer = this.port.writable.getWriter();
    this._readLoop();
    state.connected = true;
  }

  async connect(baud) {
    if (!this.supported) throw new Error('Web Serial not supported. Use Chrome or Edge.');
    const port = await navigator.serial.requestPort();
    await this.openPort(port, baud);
  }

  async disconnect() {
    state.connected = false;
    try { if (this.reader) { await this.reader.cancel(); this.reader.releaseLock(); } } catch(e){}
    try { if (this.writer) { this.writer.releaseLock(); } } catch(e){}
    try { if (this.port) await this.port.close(); } catch(e){}
    this.port = this.reader = this.writer = null;
    this._buf = new Uint8Array(0);
  }

  async _readLoop() {
    try {
      while (this.reader) {
        const { value, done } = await this.reader.read();
        if (done) break;
        if (value?.length) {
          const nb = new Uint8Array(this._buf.length + value.length);
          nb.set(this._buf); nb.set(value, this._buf.length);
          this._buf = nb;
        }
      }
    } catch(e) { /* port closed */ }
  }

  async readExact(n, timeout=3000) {
    const t0 = Date.now();
    while (this._buf.length < n) {
      if (Date.now() - t0 > timeout) throw new Error('Radio timeout — check cable, volume, quiet channel.');
      await sleep(20);
    }
    const out = this._buf.slice(0, n);
    this._buf = this._buf.slice(n);
    return out;
  }

  async write(bytes) {
    if (!this.writer) throw new Error('Not connected');
    await this.writer.write(bytes instanceof Uint8Array ? bytes : new Uint8Array(bytes));
  }

  async writeByte(b) { await this.write([b]); }
}

const UV5R = {
  async ident(serial, model) {
    const tries = model.magic === 'uv82' ? [UV5R_MAGIC.uv82] : [UV5R_MAGIC.default, UV5R_MAGIC.orig];

      try {
        for (const b of magic) { await serial.writeByte(b); await sleep(10); }
        const ack = await serial.readExact(1);
        if (ack[0] !== 0x06) continue;
        await serial.writeByte(0x02);
        let resp = new Uint8Array(0);
        for (let i = 0; i < 13; i++) {
          const b = await serial.readExact(1);
          resp = new Uint8Array([...resp, ...b]);
          if (b[0] === 0xDD) break;

        let ident;
        if (resp.length === 12) ident = new Uint8Array([resp[0],resp[3],resp[5],...resp.slice(7)]);
        else ident = resp;
        await serial.writeByte(0x06);
        const ack2 = await serial.readExact(1);
        if (ack2[0] !== 0x06) throw new Error('Radio refused clone mode');
        return ident;

      const block = await this.readBlock(serial, i, 0x40, i === 0);
      const nd = new Uint8Array(data.length + block.length);
      nd.set(data); nd.set(block, data.length);
      data = nd;
      if (onProgress) onProgress(i + 0x40, total);

      const b0 = await this.readBlock(serial, 0x1e80, 0x40, true);
      const b1 = await this.readBlock(serial, 0x1ec0, 0x40, false);

        ? { start: 0x1ec0, end: 0x1fc0, step: 0x40, tail: [0x1fc0,0x2000,0x10] }

        const block = await this.readBlock(serial, i, 0x40, false);
        const nd = new Uint8Array(data.length + block.length);
        nd.set(data); nd.set(block, data.length); data = nd;
      }
      if (auxRanges.tail) {
        for (let i = auxRanges.tail[0]; i < auxRanges.tail[1]; i += auxRanges.tail[2]) {
          const block = await this.readBlock(serial, i, 0x10, false);
          const nd = new Uint8Array(data.length + block.length);
          nd.set(data); nd.set(block, data.length); data = nd;
        }

  },

  async sendBlock(serial, addr, block) {
    const hdr = new Uint8Array([0x58, (addr>>8)&0xff, addr&0xff, block.length]);
    await serial.write(hdr);
    await serial.write(block);

        const block = image.slice(addr, addr + 0x40);

  parseChannels(image, model) {

      const off = 0x0008 + n * 16;

      if (raw[0] === 0xff) { chs.push(emptyChannel(n)); continue; }
      const ch = emptyChannel(n);
      ch.empty = false;
      ch.freq = lbcdDecode(raw.slice(0,4));
      const txRaw = raw.slice(4,8);
      const txAllFf = txRaw.every(b => b === 0xff);
      if (txAllFf) { ch.duplex = 'off'; ch.offset = 0; }
      else {
        const tx = lbcdDecode(txRaw);
        if (tx === ch.freq) { ch.duplex = ''; ch.offset = 0; }
        else if (Math.abs(ch.freq - tx) > 70e6) { ch.duplex = 'split'; ch.offset = tx; }

      ch.skip = (raw[15]>>2)&1 ? '' : 'S';

      for (let i = 0; i < model.nameLen; i++) {
        const c = image[noff+i];
        if (c === 0xff || c === 0) break;
        name += String.fromCharCode(c);

      ch.name = name.trim();
      chs.push(ch);
    }
    return chs;
  },

  encodeChannels(image, channels, model) {
    const img = new Uint8Array(image);
    for (const ch of channels) {
      const off = 0x0008 + ch.number * 16;
      const noff = 0x1008 + ch.number * 16;
      if (ch.empty) {
        img.fill(0xff, off, off+16);
        img.fill(0xff, noff, noff+16);
        continue;
      }
      img.fill(0, off, off+16);
      img.set(lbcdEncode(ch.freq), off);
      let tx;
      if (ch.duplex === 'off') tx = new Uint8Array([0xff,0xff,0xff,0xff]);
      else if (ch.duplex === 'split') tx = lbcdEncode(ch.offset);
      else if (ch.duplex === '+') tx = lbcdEncode(ch.freq + ch.offset);
      else if (ch.duplex === '-') tx = lbcdEncode(ch.freq - ch.offset);
      else tx = lbcdEncode(ch.freq);

      img[off+8]=rxt&0xff; img[off+9]=(rxt>>8)&0xff;
      img[off+10]=txt&0xff; img[off+11]=(txt>>8)&0xff;

      img.fill(0, noff, noff+16);
      const nm = (ch.name||'').slice(0, model.nameLen);
      for (let i = 0; i < nm.length; i++) img[noff+i] = nm.charCodeAt(i);
    }
    return img;
  },

  parseSettings(image) {
    const o = 0x0e28;
    return {
      squelch: image[o] ?? 5,
      vox: image[o+4] ?? 0,
      beep: image[o+9] ?? 1,
      voice: image[o+0xd] ?? 0,
      backlight: image[o+6] ?? 5,
      timeout: image[o+0xa] ?? 0,
      boot1: readStr(image, 0x1818, 7),
      boot2: readStr(image, 0x181f, 7),
    };
  },

  applySettings(image, s) {
    const img = new Uint8Array(image);
    const o = 0x0e28;
    if (s.squelch != null) img[o] = +s.squelch;
    if (s.vox != null) img[o+4] = +s.vox;
    if (s.beep != null) img[o+9] = s.beep ? 1 : 0;
    if (s.voice != null) img[o+0xd] = +s.voice;
    if (s.backlight != null) img[o+6] = +s.backlight;
    writeStr(img, 0x1818, 7, s.boot1||'');
    writeStr(img, 0x181f, 7, s.boot2||'');
    return img;
  },
};

function readStr(img, off, len) {
  let s=''; for (let i=0;i<len;i++){const c=img[off+i];if(!c||c===0xff)break;s+=String.fromCharCode(c);} return s;
}
function writeStr(img, off, len, s) {
  for (let i=0;i<len;i++) img[off+i] = i < s.length ? s.charCodeAt(i) : 0xff;
}

function decodeTones(txt, rxt) {
  const dec = v => {
    if (!v || v === 0xffff) return ['',0];
    if (v >= 0x258) return ['Tone', v/10];
    const inv = v > 0x69; const idx = inv ? v-0x6a : v-1;
    return ['DTCS', DTCS_CODES[idx]||23, inv?'R':'N'];
  };
  const [txm,txv,txp] = [...dec(txt), 'N'].slice(0,3);
  const [rxm,rxv,rxp] = [...dec(rxt), 'N'].slice(0,3);
  const ch = { tmode:'', rtone:88.5, ctone:88.5, dtcs:23, rx_dtcs:23 };
  if (txm==='Tone'&&!rxm) ch.tmode='Tone';
  else if (txm==='Tone'&&rxm==='Tone'&&txv===rxv) { ch.tmode='TSQL'; ch.ctone=txv; ch.rtone=txv; }
  else if (txm==='DTCS'&&rxm==='DTCS'&&txv===rxv) { ch.tmode='DTCS'; ch.dtcs=txv; ch.rx_dtcs=rxv; }
  else if (txm||rxm) ch.tmode='TSQL';
  if (txm==='Tone') ch.rtone=txv;
  if (rxm==='Tone') ch.ctone=rxv;
  return ch;
}

function encodeTones(ch) {
  const enc = (mode, val, pol) => {
    if (mode==='Tone'||mode==='TSQL') return Math.round((val||88.5)*10);
    if (mode==='DTCS') { let i=DTCS_CODES.indexOf(val||23); if(i<0)i=0; return (pol==='R'?0x6a:0)+i+1; }
    return 0;
  };
  if (ch.tmode==='Tone') return [enc('Tone',ch.rtone), 0];
  if (ch.tmode==='TSQL') return [enc('Tone',ch.ctone), enc('Tone',ch.ctone)];
  if (ch.tmode==='DTCS') return [enc('DTCS',ch.dtcs), enc('DTCS',ch.dtcs)];
  return [0, 0];
}

const UV17 = {
  async sendMagic(serial, magic, respLen) {
    await serial.write(new TextEncoder().encode(magic));

      ['PASSSTA',3],['SYSINFO',1],

      [new Uint8Array([6]),1],
      [new Uint8Array([0x56,0,0x10,0x0a,0x0d]),13],
      [new Uint8Array([6]),1],
      [new Uint8Array([0x56,0,0x20,0x0a,0x0d]),13],
      [new Uint8Array([6]),1],
    ];

      await this.sendMagic(serial, msg, l);
    }

    await this.sendMagic(serial, new Uint8Array([6]), 1);
    return memSize;

      await serial.write(frame);

      await this.sendMagic(serial, new Uint8Array([6]), 1);

  },

  async readChunk(serial, addr, size) {
    const frame = new Uint8Array([0x52, (addr>>16)&0xff, (addr>>8)&0xff, addr&0xff, size]);

    const d = await serial.readExact(size + 5);

    let data = new Uint8Array(0);

        const nd = new Uint8Array(data.length + chunk.length);

    }

  },

    await this.ident(serial);

    if (n >= 507) return { base: 0x0030 + 0x10*2 + 0x10 + (n-507)*16, inline:false };
    if (n >= 252) return { base: 0x0030 + 0x10 + (n-252)*16, inline:false };

      ch.mode = (raw[15]>>1)&1 ? 'FM':'NFM';
      ch.skip = (raw[15]>>3)&1 ? '' : 'S';

    }

  },

  encodeChannels(image, channels, model) {
    const img = new Uint8Array(image);

      else if (ch.duplex==='split') tx=lbcdEncode(ch.offset);
      else if (ch.duplex==='+') tx=lbcdEncode(ch.freq+ch.offset);
      else if (ch.duplex==='-') tx=lbcdEncode(ch.freq-ch.offset);
      else tx=lbcdEncode(ch.freq);
      img.set(tx, off+4);
      const [txt,rxt]=encodeTones(ch);

      img[off+10]=txt&0xff; img[off+11]=(txt>>8)&0xff;

      img[off+14]=((lp&1)<<2);
      img[off+15]=(ch.mode==='FM'?2:0)|((ch.skip==='S'?0:1)<<3);

    }

  },

  parseSettings(image) {
    const o = 0x7000;
    return {
      squelch: image[o+1]??5, vox: image[o+2]??0, backlight: image[o+3]??5,
      beep: image[o+5]??1, voice: image[o+7]??0,
      boot1: readStr(image, o+0x10, 10), boot2: readStr(image, o+0x20, 10),
    };
  },
};

const ENC_TBL = ['BHT ','CO 7','A ES',' EIY','M PQ','XN Y','RVB ',' HQP','W RC','MS N',' SAT','K DH','ZO R','C SL','6RB ',' JCG','PN V','J PK','EK L','I LZ'];

function crypt(sym, buf) {
  const t = ENC_TBL[sym] || ENC_TBL[1];
  const out = new Uint8Array(buf.length);
  let i1 = 0;
  for (let i = 0; i < buf.length; i++) {
    const c = buf[i];
    const enc = t.charCodeAt(i1) !== 32 && c && c !== 255 && c !== t.charCodeAt(i1) && c !== (t.charCodeAt(i1)^255);
    out[i] = enc ? (c ^ t.charCodeAt(i1)) : c;
    i1 = (i1+1)%4;
  }
  return out;
}

const UV17PRO = {
  async ident(serial) {
    serial._buf = new Uint8Array(0);

    const steps = [
      [new Uint8Array([0x46]),16],[new Uint8Array([0x4d]),15],
      [new Uint8Array([0x53,0x45,0x4e,0x44,0x21,0x05,0x0d,0x01,0x01,0x01,0x04,0x11,0x08,0x05,0x0d,0x0d,0x01,0x11,0x0f,0x09,0x12,0x09,0x10,0x04,0x00]),1],
    ];
    for (const [m,l] of steps) await serial.write(m), await serial.readExact(l);
    return true;
  },

  makeRead(addr, len) {
    return new Uint8Array([0x52, (addr>>16)&0xff, (addr>>8)&0xff, addr&0xff, len]);
  },

  async download(serial, onProgress) {
    await this.ident(serial);
    const regions = [[0,0x8040],[0x9000,0x40],[0xa000,0x1c0]];
    let data = new Uint8Array(0), total = 0x8240, done = 0;
    for (const [start, size] of regions) {
      for (let addr = start; addr < start+size; addr += 0x40) {
        await serial.write(this.makeRead(addr, 0x40));
        let d = await serial.readExact(0x44);
        d = crypt(1, d.slice(4));
        const nd = new Uint8Array(data.length + d.length);
        nd.set(data); nd.set(d, data.length); data = nd;
        done += 0x40;
        if (onProgress) onProgress(done, total);
      }
    }
    return data;
  },

  async upload(serial, image, onProgress) {
    await this.ident(serial);
    const regions = [[0,0x8040],[0x9000,0x40],[0xa000,0x1c0]];
    let done=0, total=0x8240;
    for (const [start,size] of regions) {
      let da = start===0?0:(start===0x9000?0x8040:0x8080);
      for (let addr=start; addr<start+size; addr+=0x40) {
        let block = image.slice(da, da+0x40);
        if (block.length<0x40) { const p=new Uint8Array(0x40); p.fill(0xff); p.set(block); block=p; }
        block = crypt(1, block);
        const frame = new Uint8Array([0x57,(addr>>16)&0xff,(addr>>8)&0xff,addr&0xff,0x40,...block]);
        await serial.write(frame);
        const ack = await serial.readExact(1);
        if (ack[0]!==0x06) throw new Error('Mini upload failed');
        da+=0x40; done+=0x40;
        if (onProgress) onProgress(done,total);
      }
    }
  },

  parseChannels(image, model) {
    const chs = [];
    const STRIDE = 32;
    for (let n = 0; n < model.channels; n++) {
      const off = n * STRIDE;
      const raw = image.slice(off, off+STRIDE);
      if (!raw.length || raw[0]===0xff) { chs.push(emptyChannel(n)); continue; }
      const ch = emptyChannel(n); ch.empty=false;
      ch.freq = lbcdDecode(raw.slice(0,4));
      const tx = lbcdDecode(raw.slice(4,8));
      if (raw[4]===0xff) ch.duplex='off';
      else if (tx===ch.freq) ch.duplex='';
      else if (Math.abs(ch.freq-tx)>70e6) { ch.duplex='split'; ch.offset=tx; }
      else if (tx>ch.freq) { ch.duplex='+'; ch.offset=tx-ch.freq; }
      else { ch.duplex='-'; ch.offset=ch.freq-tx; }
      const rxt=(raw[9]<<8)|raw[8], txt=(raw[11]<<8)|raw[10];
      Object.assign(ch, decodeTones(txt,rxt));
      ch.power=['High','Low'][raw[14]&3]||'High';
      ch.mode=(raw[15]>>1)&1?'FM':'NFM';
      ch.name=readStr(raw,20,model.nameLen);
      chs.push(ch);
    }
    return chs;
  },

  encodeChannels(image, channels, model) {
    const img = new Uint8Array(image);
    const STRIDE=32;
    for (const ch of channels) {
      const off = ch.number * STRIDE;
      if (ch.empty) { img.fill(0xff,off,off+STRIDE); continue; }
      img.fill(0,off,off+STRIDE);
      img.set(lbcdEncode(ch.freq),off);
      let tx;
      if (ch.duplex==='off') tx=new Uint8Array([0xff,0xff,0xff,0xff]);
      else if (ch.duplex==='split') tx=lbcdEncode(ch.offset);
      else if (ch.duplex==='+') tx=lbcdEncode(ch.freq+ch.offset);
      else if (ch.duplex==='-') tx=lbcdEncode(ch.freq-ch.offset);
      else tx=lbcdEncode(ch.freq);
      img.set(tx,off+4);
      const [txt,rxt]=encodeTones(ch);
      img[off+8]=rxt&0xff; img[off+9]=(rxt>>8)&0xff;
      img[off+10]=txt&0xff; img[off+11]=(txt>>8)&0xff;
      writeStr(img,off+20,model.nameLen,ch.name||'');
    }
    return img;
  },

  parseSettings(image) {
    const o=0x8000;
    return { squelch:image[o]??5, vox:image[o+2]??0, backlight:image[o+3]??5, beep:image[o+5]??1, voice:image[o+7]??0 };
  },
};

const DRIVERS = { uv5r: UV5R, uv17: UV17, uv17pro: UV17PRO };

function getDriver(model) { return DRIVERS[model.family]; }

async function downloadRadio() {
  if (!state.serial) throw new Error('Connect first');
  setProgress('Downloading from radio…', 0);
  const drv = getDriver(state.model);
  const img = await drv.download(state.serial, state.model, (c,m)=>setProgress('Downloading…',c/m));
  state.image = img;
  state.backupAt = new Date();
  state.channels = drv.parseChannels(img, state.model);
  state.settings = drv.parseSettings ? drv.parseSettings(img) : {};
  setProgress(null);
  saveBackupSnapshot('Download from radio');
  toast('Download complete — backup ready','success');
  render();
}

async function uploadRadio() {
  if (!state.image) throw new Error('Download or load a backup first');
  if (!state.backupAt && !confirm('No backup this session. Upload can brick mis-matched firmware. Continue?')) return;
  const sum = channelIssuesSummary();
  if (sum.errors && !confirm(`${sum.errors} channel(s) have India band-plan TX issues. Upload anyway?`)) return;
  saveBackupSnapshot('Before upload');
  syncChannelsToImage();
  setProgress('Uploading to radio…', 0);
  const drv = getDriver(state.model);
  await drv.upload(state.serial, state.image, state.model, (c,m)=>setProgress('Uploading…',c/m));
  setProgress(null);
  toast('Upload complete. Restart radio and verify channels.','success');
}

function syncChannelsToImage() {
  if (!state.image) {
    const sizes = { uv5r: 0x1808, uv17: 0x9000, uv17pro: 0x8240 };
    state.image = new Uint8Array(sizes[state.model.family] || 0x9000);
    state.image.fill(0xff);
  }
  const drv = getDriver(state.model);
  state.image = drv.encodeChannels(state.image, state.channels, state.model);
  if (state.model.family === 'uv5r' && state.settings) state.image = UV5R.applySettings(state.image, state.settings);
}

// ─── CSV & Files ─────────────────────────────────────────────
function channelsToCsv(channels) {
  const hdr = 'Location,Name,Frequency,Duplex,Offset,Tone,rToneFreq,cToneFreq,DtcsCode,DtcsPolarity,Mode,Power,TStep,Skip';
  const rows = channels.filter(c=>!c.empty).map(c=>{
    const loc = c.number;
    return [loc,c.name,freqMHz(c.freq),c.duplex||'',c.duplex&&(c.duplex==='split'?freqMHz(c.offset):(c.offset/1e6).toFixed(3))||'',
      c.tmode||'',c.rtone||'',c.ctone||'',c.dtcs||'',c.tmode==='DTCS'?'NN':'',c.mode,c.power,'12.5',c.skip||''].join(',');
  });
  return hdr+'\n'+rows.join('\n');
}

function csvToChannels(text, model) {
  const lines = text.trim().split(/\r?\n/);
  const hdr = lines[0].toLowerCase().split(',');
  const idx = n => hdr.indexOf(n.toLowerCase());
  const chs = [];
  for (let i=0;i<model.channels;i++) chs.push(emptyChannel(i));
  for (let i=1;i<lines.length;i++) {
    const cols = lines[i].split(',');
    const loc = parseInt(cols[idx('location')]||cols[0],10);
    if (isNaN(loc)||loc<0||loc>=model.channels) continue;
    const ch = chs[loc] || emptyChannel(loc);
    ch.number=loc; ch.empty=false;
    ch.name=(cols[idx('name')]||'').trim();
    ch.freq=parseFreqMHz(cols[idx('frequency')]);
    ch.duplex=(cols[idx('duplex')]||'').trim();
    const off=cols[idx('offset')]; ch.offset=ch.duplex==='split'?parseFreqMHz(off):parseFreqMHz(off)*1e6||600000;
    ch.tmode=(cols[idx('tone')]||'').trim();
    ch.rtone=parseFloat(cols[idx('rtonefreq')])||88.5;
    ch.ctone=parseFloat(cols[idx('ctonefreq')])||88.5;
    ch.dtcs=parseInt(cols[idx('dtcscode')],10)||23;
    ch.mode=(cols[idx('mode')]||'FM').trim();
    ch.power=(cols[idx('power')]||'High').trim();
    ch.skip=(cols[idx('skip')]||'').trim();
    chs[loc]=ch;
  }
  return chs;
}

function saveImageFile() {
  if (!state.image) return;
  syncChannelsToImage();
  const blob = new Blob([state.image], {type:'application/octet-stream'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `vu35kb-backup-${state.model.id}-${Date.now()}${state.model.ext}`;
  a.click();
}

function loadImageFile(buf) {
  state.image = new Uint8Array(buf);
  const drv = getDriver(state.model);
  state.channels = drv.parseChannels(state.image, state.model);
  state.settings = drv.parseSettings ? drv.parseSettings(state.image) : {};
  state.backupAt = new Date();
  saveBackupSnapshot('Loaded from file');
  toast('Backup loaded','success');
  render();
}

function setProgress(msg, frac) {
  state.progress = msg ? { msg, frac: frac||0 } : null;
  const el = $('progress-bar');
  if (el) {
    el.style.display = msg ? 'block' : 'none';
    const p = el.querySelector('.progress-label') || el.querySelector('p');
    if (p) p.textContent = msg || '';
    el.querySelector('i').style.width = ((frac||0)*100)+'%';
  }
}

function closePanel() {
  state.detailCh = null;
  $('app')?.classList.remove('panel-open');
  const p = $('detail');
  if (p) {
    p.classList.remove('open');
    p.innerHTML = '';
  }
  $('panel-backdrop')?.classList.remove('visible');
  document.body.classList.remove('panel-open');
}

function panelWrap(title, subtitle, bodyHtml) {
  const sub = subtitle ? `<span class="panel-kicker">${subtitle}</span>` : '';
  return `<div class="panel-sheet">
    <div class="panel-drag" aria-hidden="true"></div>
    <div class="panel-head">
      <div class="panel-head-text">${sub}<h3>${title}</h3></div>
      <button type="button" class="panel-close" data-panel-close aria-label="Close">
        <span class="panel-close-x" aria-hidden="true">×</span>
        <span class="panel-close-label">Close</span>
      </button>
    </div>
    <div class="panel-body">${bodyHtml}</div>
  </div>`;
}

function filteredChannels() {
  const q = state.filter.toLowerCase();
  return state.channels.filter(c => {
    if (state.filterMode === 'programmed' && c.empty) return false;
    if (state.filterMode === 'empty' && !c.empty) return false;
    if (state.filterMode === 'issues' && (c.empty || validateChannelIndia(c).level === 'ok' || validateChannelIndia(c).level === 'rx')) return false;
    if (!q) return true;
    if (c.empty) return q === 'empty' || q === 'free';
    return String(c.number).includes(q) || (c.name||'').toLowerCase().includes(q) || freqMHz(c.freq).includes(q);
  });
}

function modelSpecLine(m) {
  const family = m.family === 'uv5r' ? 'UV-5R clone' : m.family === 'uv17' ? 'UV-17 / P15' : 'UV-17Pro';
  const risk = m.family === 'uv5r' ? 'Standard' : m.id === 'uv13' ? 'High — backup first' : 'Experimental';
  return { family, risk, image: m.family === 'uv5r' ? '~6 KB' : m.id === 'uv13' ? '~200 KB' : '~33 KB' };
}

function bindHomePage() {
  $('home-connect')?.addEventListener('click', () => heroStart());
  $('home-load')?.addEventListener('click', () => { $('file-input').dataset.mode = 'image'; $('file-input').click(); });
  $('home-csv')?.addEventListener('click', () => { $('file-input').dataset.mode = 'csv'; $('file-input').click(); });
  $('home-wizard')?.addEventListener('click', () => { state.detailCh = 'wizard'; renderDetail(); openDetailPanel(); closeSidebarOnMobile(); });
  $('home-history')?.addEventListener('click', () => { state.detailCh = 'history'; renderDetail(); openDetailPanel(); closeSidebarOnMobile(); });
  $('home-settings')?.addEventListener('click', () => { state.detailCh = 'settings'; renderDetail(); openDetailPanel(); closeSidebarOnMobile(); });
  document.querySelectorAll('.home-restore').forEach(btn => btn.addEventListener('click', () => restoreBackup(btn.dataset.restore)));
  document.querySelectorAll('[data-home-model]').forEach(row => row.addEventListener('click', () => {
    const id = row.dataset.homeModel;
    if (!MODELS[id] || state.model.id === id) return;
    state.model = MODELS[id];
    state.channels = [];
    state.image = null;
    initChannels();
    render();
  }));
}

async function heroStart() {
  if (!state.connected) {
    await toggleConnect();
    if (state.connected) downloadRadio().catch(e => toast(e.message, 'error'));
  } else {
    downloadRadio().catch(e => toast(e.message, 'error'));
  }
}

function renderMain() {
  const main = $('main');
  const hasData = state.backupAt || state.channels.some(c => !c.empty);

  if (!hasData) {
    main.innerHTML = renderHomePage() + `<div id="progress-bar" style="display:none"><p class="progress-label"></p><div class="progress"><i></i></div></div>`;
    bindHomePage();
    return;
  }

  const programmed = state.channels.filter(c=>!c.empty).length;
  const empty = state.model.channels - programmed;
  const bandSum = channelIssuesSummary();
  const list = filteredChannels();
  const pageSize = layoutPageSize();
  const pages = Math.max(1, Math.ceil(list.length / pageSize));
  if (state.page >= pages) state.page = pages - 1;
  const pageList = list.slice(state.page * pageSize, (state.page + 1) * pageSize);

  main.innerHTML = `
    ${!serialSupported() && hasData ? `<div class="mobile-note"><strong>View-only on this browser</strong>Load, edit, and save backups locally. Use desktop Chrome/Edge with a USB cable to sync with the radio.</div>` : ''}
    ${state.connected && !state.backupAt ? `<div class="warn-banner"><span>⎈</span><span><strong>Cable connected</strong> — channels are not loaded yet. Open the menu and click <strong>Download from radio</strong>.</span></div>` : ''}
    ${state.model.id==='uv13'?'<div class="warn-banner"><span>⚠</span><span><strong>UV-13 Pro:</strong> Always save a factory backup first. Upload only after a successful download from the same radio.</span></div>':''}
    ${bandSum.errors?`<div class="band-banner"><strong>India band plan:</strong> ${bandSum.errors} channel(s) transmit outside licensed HT segments (2 m: 144–146 MHz · 70 cm: 434–438 MHz). Fix before upload or use RX-only.</div>`:''}
    ${!bandSum.errors && bandSum.warns?`<div class="band-banner warn-only"><strong>Review:</strong> ${bandSum.warns} channel(s) need license-grade or local-rule verification.</div>`:''}
    ${state.showFreqMap ? renderFreqMap() : ''}
    <div class="stats">
      <div class="stat"><b>${programmed}</b><small>Channels programmed</small></div>
      <div class="stat"><b>${empty}</b><small>Empty slots</small></div>
      <div class="stat"><b>${state.model.name}</b><small>Selected model</small></div>
    </div>
    <div class="topbar">
      <div class="seg">
        <button class="${state.view==='cards'?'active':''}" data-view="cards">Cards</button>
        <button class="${state.view==='table'?'active':''}" data-view="table">Table</button>
      </div>
      <div class="chip-row">
        <button class="chip ${state.filterMode==='all'?'active':''}" data-fm="all">All</button>
        <button class="chip ${state.filterMode==='programmed'?'active':''}" data-fm="programmed">Programmed</button>
        <button class="chip ${state.filterMode==='empty'?'active':''}" data-fm="empty">Empty</button>
        ${bandSum.errors || bandSum.warns ? `<button class="chip ${state.filterMode==='issues'?'active':''}" data-fm="issues">Band issues (${bandSum.errors + bandSum.warns})</button>` : ''}
      </div>
      <input class="search" placeholder="Search name or frequency…" value="${esc(state.filter)}" id="search-in">
      ${pages>1?`<div class="seg"><button class="btn-ghost" id="pg-prev" ${state.page<=0?'disabled':''} style="padding:.35rem .6rem">‹</button><span style="padding:.35rem .5rem;font-size:.78rem;font-weight:600">${state.page+1} / ${pages}</span><button class="btn-ghost" id="pg-next" ${state.page>=pages-1?'disabled':''} style="padding:.35rem .6rem">›</button></div>`:''}
    </div>
    <div id="progress-bar" style="display:none"><p class="progress-label"></p><div class="progress"><i></i></div></div>
    <div id="channel-area"></div>
    ${state.selected.size?`<div class="bulk-bar"><span>${state.selected.size} selected</span>
      <button class="btn-ghost" data-bulk="high">High power</button>
      <button class="btn-ghost" data-bulk="skip">Skip scan</button>
      <button class="btn-ghost" data-bulk="clear">Clear</button></div>`:''}
  `;
  main.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>{state.view=b.dataset.view;renderMain();});
  main.querySelectorAll('[data-fm]').forEach(b=>b.onclick=()=>{state.filterMode=b.dataset.fm;state.page=0;renderMain();});
  $('search-in').oninput = e=>{state.filter=e.target.value;state.page=0;renderMain();};
  const pgPrev=$('pg-prev'), pgNext=$('pg-next');
  if (pgPrev) pgPrev.onclick=()=>{state.page--;renderMain();};
  if (pgNext) pgNext.onclick=()=>{state.page++;renderMain();};
  const area = $('channel-area');
  if (state.view==='cards') {
    area.innerHTML = '<div class="grid-cards">'+pageList.map(renderCard).join('')+'</div>';
    area.querySelectorAll('.ch-card').forEach(el=>{
      el.onclick = e=>{
        if (e.shiftKey) { const n=+el.dataset.n; state.selected.has(n)?state.selected.delete(n):state.selected.add(n); renderMain(); return; }
        state.detailCh=+el.dataset.n; renderDetail(); openDetailPanel();
      };
    });
  } else {
    area.innerHTML = renderTable(pageList);
    area.querySelectorAll('[data-ch]').forEach(inp=>{ inp.onchange = ()=> applyTableEdit(inp); });
  }
  main.querySelectorAll('[data-bulk]').forEach(b=>b.onclick=()=>doBulk(b.dataset.bulk));
  bindFreqMap();
}

function renderCard(c) {
  if (c.empty) return `<div class="ch-card empty-card" data-n="${c.number}"><div class="row1"><span class="ch-num">CH ${c.number}</span></div><div class="ch-meta">Tap to program · Shift+click to select</div></div>`;
  const band = bandOf(c.freq).toLowerCase();
  const dup = c.duplex==='+'||c.duplex==='-'?` ${c.duplex}${(c.offset/1e6).toFixed(3)}` : c.duplex==='split'?` → ${freqMHz(c.offset)}`:'';
  const v = validateChannelIndia(c);
  const badgeCls = v.level === 'error' ? 'ch-badge-err' : v.level === 'warn' ? 'ch-badge-warn' : v.level === 'rx' ? 'ch-badge-rx' : 'ch-badge-ok';
  const badgeTxt = v.level === 'ok' ? 'Ham OK' : v.level === 'rx' ? 'RX only' : v.level === 'warn' ? 'Review' : 'Band issue';
  return `<div class="ch-card ${band} ${state.selected.has(c.number)?'sel':''}" data-n="${c.number}">
    <div class="row1"><span class="ch-num">CH ${c.number}</span><span><span class="badge">${bandOf(c.freq)}</span> <span class="badge">${c.power}</span> <span class="badge ${badgeCls}" title="${esc(v.msg)}">${badgeTxt}</span></span></div>
    <div class="ch-name">${esc(c.name||'—')}</div>
    <div class="ch-freq">${freqMHz(c.freq)}${dup} MHz</div>
    <div class="ch-meta">${c.tmode||'No tone'}${c.skip==='S'?' · Scan skip':''}</div></div>`;
}

function renderTable(list) {
  const rows = list.map(c=>`<tr>
    <td><input type="checkbox" data-sel="${c.number}" ${state.selected.has(c.number)?'checked':''}></td>
    <td>${c.number}</td>
    <td><input data-ch="${c.number}" data-f="name" value="${esc(c.name||'')}"></td>
    <td><input data-ch="${c.number}" data-f="freq" value="${c.empty?'':freqMHz(c.freq)}"></td>
    <td><select data-ch="${c.number}" data-f="duplex"><option ${c.duplex===''?'selected':''}></option><option value="+" ${c.duplex==='+'?'selected':''}>+</option><option value="-" ${c.duplex==='-'?'selected':''}>-</option><option value="split" ${c.duplex==='split'?'selected':''}>split</option></select></td>
    <td><input data-ch="${c.number}" data-f="offset" value="${c.duplex==='split'?freqMHz(c.offset):(c.offset/1e6).toFixed(3)}"></td>
    <td><select data-ch="${c.number}" data-f="tmode"><option value=""></option><option ${c.tmode==='Tone'?'selected':''}>Tone</option><option ${c.tmode==='TSQL'?'selected':''}>TSQL</option><option ${c.tmode==='DTCS'?'selected':''}>DTCS</option></select></td>
    <td><select data-ch="${c.number}" data-f="power">${state.model.powers.map(p=>`<option ${c.power===p?'selected':''}>${p}</option>`).join('')}</select></td>
  </tr>`).join('');
  return `<div class="table-wrap"><table><thead><tr><th></th><th>#</th><th>Name</th><th>RX MHz</th><th>Dup</th><th>Offset</th><th>Tone</th><th>Pwr</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

function applyTableEdit(inp) {
  const n=+inp.dataset.ch, f=inp.dataset.f, ch=state.channels.find(c=>c.number===n);
  if (!ch) return;
  ch.empty=false;
  if (f==='name') ch.name=inp.value;
  if (f==='freq') ch.freq=parseFreqMHz(inp.value);
  if (f==='duplex') ch.duplex=inp.value;
  if (f==='offset') ch.offset=ch.duplex==='split'?parseFreqMHz(inp.value):parseFloat(inp.value)*1e6;
  if (f==='tmode') ch.tmode=inp.value;
  if (f==='power') ch.power=inp.value;
}

function doBulk(action) {
  for (const n of state.selected) {
    const ch = state.channels.find(c=>c.number===n);
    if (!ch) continue;
    if (action==='high') ch.power='High';
    if (action==='skip') ch.skip='S';
    if (action==='clear') Object.assign(ch, emptyChannel(n));
  }
  state.selected.clear();
  render();
}

function renderDetail() {
  const p = $('detail');
  if (state.detailCh === null) { p.innerHTML = ''; return; }

  if (state.detailCh==='connect') {
    p.innerHTML = panelWrap('Connect programming cable', 'USB serial', `
      <p class="hint">The browser controls which USB devices appear — not this app. If the list is empty, check cable, drivers, and that no other app (CHIRP, etc.) has the port open.</p>
      <div class="home-callout" style="margin:0">
        <strong>Connected ≠ channels loaded</strong>
        After connecting you must click <strong>Download from radio</strong> to read channels into the editor.
      </div>
      <div class="nav-section" style="margin-top:.75rem">Previously authorized cables</div>
      <div id="connect-port-list"><p class="hint">Searching…</p></div>
      <button type="button" class="btn-primary" id="connect-new" style="width:100%;margin-top:.5rem">Add new USB cable…</button>
      <details class="connect-help" style="margin-top:.75rem">
        <summary style="cursor:pointer;font-size:.82rem;font-weight:600;color:var(--muted)">Cable not showing?</summary>
        <ul class="hint" style="margin:.5rem 0 0 1rem;line-height:1.5">
          <li>Use a <strong>K1 programming cable</strong> (CH340/FTDI/CP210x), not a charge-only USB lead</li>
          <li>Radio ON, volume at 100%, programming jack fully seated</li>
          <li>Chrome or Edge on desktop (not Safari/Firefox)</li>
          <li>Close CHIRP or other serial tools using the same port</li>
          <li>macOS: install driver for your USB chip if the picker stays empty</li>
          <li>Linux: add user to <code>dialout</code> group</li>
        </ul>
      </details>`);
    RadioSerial.getAuthorizedPorts().then(ports => {
      const list = $('connect-port-list');
      if (!list) return;
      if (!ports.length) {
        list.innerHTML = '<p class="hint">No saved cables yet — use <strong>Add new USB cable</strong> and pick your adapter in the browser dialog.</p>';
        return;
      }
      list.innerHTML = ports.map((port, i) =>
        `<button type="button" class="btn-ghost connect-port-btn" data-port-idx="${i}" style="width:100%;justify-content:flex-start;display:flex;align-items:center;gap:.5rem;margin-bottom:.35rem">
          <span class="sidebar-icon">⎈</span>${esc(RadioSerial.portLabel(port, i))}
        </button>`
      ).join('');
      list.querySelectorAll('[data-port-idx]').forEach(btn => {
        btn.onclick = () => connectToPort(ports[+btn.dataset.portIdx]).catch(e => toast(e.message, 'error'));
      });
    });
    $('connect-new').onclick = () => connectNewPort().catch(e => {
      if (e?.name !== 'NotFoundError') toast(e.message, 'error');
    });
    return;
  }
  if (state.detailCh==='wizard') {
    p.innerHTML = panelWrap('Add repeater', 'Quick action', `
      <p class="hint">We'll fill the next empty channel. Offset is calculated for you.</p>
      <div class="field"><label>Receive frequency (MHz)</label><input id="w-rx" placeholder="e.g. 145.600"></div>
      <div class="field"><label>Repeater offset</label><select id="w-off"><option value="600000">−600 kHz (VHF repeater)</option><option value="5000000">−5 MHz (UHF repeater)</option><option value="custom">Custom offset</option></select></div>
      <div class="field" id="w-custom" style="display:none"><label>Custom offset (Hz)</label><input id="w-offval" value="600000"></div>
      <div class="field"><label>CTCSS tone (Hz)</label><input id="w-tone" value="88.5"></div>
      <div class="field"><label>Channel name</label><input id="w-name" maxlength="${state.model.nameLen}" placeholder="e.g. VU2RPT"></div>
      <div class="panel-actions"><button class="btn-primary" id="w-go">Add channel</button></div>`);
    $('w-off').onchange = e=>{ $('w-custom').style.display=e.target.value==='custom'?'block':'none'; };
    $('w-go').onclick = ()=>{
      const slot = state.channels.find(c=>c.empty);
      if (!slot) return toast('No empty slots left','error');
      const rx=parseFreqMHz($('w-rx').value);
      if (!rx) return toast('Enter a valid frequency','error');
      let off = $('w-off').value==='custom'?+($('w-offval').value):+($('w-off').value);
      Object.assign(slot,{empty:false,name:$('w-name').value,freq:rx,duplex:'-',offset:off,tmode:'TSQL',ctone:+$('w-tone').value,rtone:+$('w-tone').value,power:'High',mode:'FM'});
      state.detailCh=slot.number; render(); toast(`Repeater added to CH ${slot.number}`,'success');
    };
    return;
  }
  if (state.detailCh==='history') {
    const list = loadBackupList();
    const diffA = state._diffA || '';
    const diffB = state._diffB || '';
  const diffHtml = diffA && diffB ? (() => {
      const ea = list.find(b => b.id === diffA), eb = list.find(b => b.id === diffB);
      if (!ea || !eb) return '';
      const changes = diffChannelSnapshots(ea.channels, eb.channels);
      return `<div class="field"><label>Diff: ${esc(ea.label)} → ${esc(eb.label)}</label>
        ${changes.length ? `<ul class="diff-list">${changes.slice(0, 40).map(c => `<li>CH ${c.number}: ${esc(c.summary)}</li>`).join('')}${changes.length > 40 ? `<li>…and ${changes.length - 40} more</li>` : ''}</ul>` : '<p class="hint">No channel differences</p>'}
      </div>`;
    })() : '';
    p.innerHTML = panelWrap('Backup history', 'Snapshots', `
      <p class="hint">Up to ${MAX_BACKUPS} snapshots stored in this browser. Select two to compare, or restore a previous state.</p>
      ${list.length ? `<div class="backup-list">${list.map(b => `
        <div class="backup-item">
          <strong>${esc(b.label)}</strong>
          <small>${new Date(b.ts).toLocaleString()} · ${esc(b.modelName)} · ${b.channels.filter(c => !c.empty).length} channels</small>
          <div class="backup-actions">
            <button class="btn-ghost" data-restore="${b.id}">Restore</button>
            <button class="btn-ghost" data-diff-a="${b.id}">Diff A</button>
            <button class="btn-ghost" data-diff-b="${b.id}">Diff B</button>
          </div>
        </div>`).join('')}</div>` : '<p class="hint">No snapshots yet. Download from radio or load a file to create one.</p>'}
      ${diffHtml}
      <button class="btn-ghost" id="hist-clear" style="margin-top:.75rem">Clear all history</button>`);
    p.querySelectorAll('[data-restore]').forEach(btn => btn.onclick = () => restoreBackup(btn.dataset.restore));
    p.querySelectorAll('[data-diff-a]').forEach(btn => btn.onclick = () => { state._diffA = btn.dataset.diffA; renderDetail(); });
    p.querySelectorAll('[data-diff-b]').forEach(btn => btn.onclick = () => { state._diffB = btn.dataset.diffB; renderDetail(); });
    const hc = $('hist-clear');
    if (hc) hc.onclick = () => { if (confirm('Delete all local backup snapshots?')) { localStorage.removeItem(BACKUP_KEY); state._diffA = state._diffB = ''; renderDetail(); toast('History cleared', 'success'); } };
    return;
  }
  if (state.detailCh==='settings') {
    const s=state.settings;
    const bootLen = state.model.family === 'uv5r' ? 7 : 10;
    p.innerHTML = panelWrap('Radio settings', 'Codeplug', `
      <p class="hint">Changes apply to the backup image. Upload to write them to the radio.</p>
      <div class="field"><label>Squelch (0–9)</label><input type="number" id="s-sq" min="0" max="9" value="${s.squelch??5}"></div>
      <div class="field"><label>VOX (0 = off)</label><input type="number" id="s-vox" min="0" max="10" value="${s.vox??0}"></div>
      <div class="field"><label>Key beep</label><select id="s-beep"><option value="1" ${s.beep?'selected':''}>On</option><option value="0" ${!s.beep?'selected':''}>Off</option></select></div>
      <div class="field"><label>Voice prompts</label><select id="s-voice"><option value="0" ${!s.voice?'selected':''}>Off</option><option value="1" ${s.voice===1?'selected':''}>On</option></select></div>
      <div class="field"><label>Power-on line 1</label><input id="s-b1" maxlength="${bootLen}" value="${esc(s.boot1||'')}" placeholder="Your callsign"></div>
      <div class="field"><label>Power-on line 2</label><input id="s-b2" maxlength="${bootLen}" value="${esc(s.boot2||'')}"></div>
      <div class="lcd-preview" id="lcd-live" aria-label="Power-on message preview">${bootLcdInner(s.boot1||'', s.boot2||'', bootLen)}</div>
      <div class="panel-actions"><button class="btn-primary" id="s-save">Save settings</button></div>`);
    bindBootPreview(bootLen);
    $('s-save').onclick = ()=>{
      state.settings={...state.settings,squelch:+$('s-sq').value,vox:+$('s-vox').value,beep:+$('s-beep').value,voice:+$('s-voice').value,boot1:$('s-b1').value,boot2:$('s-b2').value};
      syncChannelsToImage(); toast('Settings saved — upload to apply to radio','success');
    };
    return;
  }
  const ch = state.channels.find(c=>c.number===state.detailCh);
  if (!ch) { closePanel(); return; }
  const v = validateChannelIndia(ch);
  const vBanner = ch.empty ? '' : v.level !== 'ok' ? `<div class="band-banner ${v.level==='warn'?'warn-only':''}" style="margin-bottom:.25rem">${esc(v.msg)}${v.level==='error'?' — consider RX-only or move TX into 144–146 / 434–438 MHz.':''}</div>` : '';
  const chSub = ch.empty ? 'Empty slot' : `${freqMHz(ch.freq)} MHz · ${bandOf(ch.freq)}`;
  p.innerHTML = panelWrap(`Channel ${ch.number}`, chSub, `
    ${vBanner}
    <div class="field"><label>Name</label><input id="d-name" maxlength="${state.model.nameLen}" value="${esc(ch.name||'')}"></div>
    <div class="field"><label>Receive (MHz)</label><input id="d-freq" value="${ch.empty?'':freqMHz(ch.freq)}"></div>
    <div class="field"><label>Duplex</label><select id="d-dup"><option value=""></option><option value="+" ${ch.duplex==='+'?'selected':''}>+ Repeater</option><option value="-" ${ch.duplex==='-'?'selected':''}>− Repeater</option><option value="split" ${ch.duplex==='split'?'selected':''}>Split</option><option value="off" ${ch.duplex==='off'?'selected':''}>RX only</option></select></div>
    <div class="field"><label>Offset / TX (MHz or kHz offset)</label><input id="d-off" value="${ch.duplex==='split'?freqMHz(ch.offset):(ch.offset/1e6).toFixed(3)}"></div>
    <div class="field"><label>Tone</label><select id="d-tm"><option value=""></option><option ${ch.tmode==='Tone'?'selected':''}>Tone</option><option ${ch.tmode==='TSQL'?'selected':''}>TSQL</option><option ${ch.tmode==='DTCS'?'selected':''}>DTCS</option></select></div>
    <div class="field"><label>Tone frequency (Hz)</label><input id="d-tone" value="${ch.ctone||88.5}"></div>
    <div class="field"><label>Power</label><select id="d-pwr">${state.model.powers.map(p=>`<option ${ch.power===p?'selected':''}>${p}</option>`).join('')}</select></div>
    <div class="field"><label>Bandwidth</label><select id="d-mode"><option ${ch.mode==='FM'?'selected':''}>Wide (FM)</option><option ${ch.mode==='NFM'?'selected':''}>Narrow (NFM)</option></select></div>
    <div class="panel-actions">
      <button class="btn-primary" id="d-save">Save channel</button>
      <button class="btn-danger" id="d-del">Clear this channel</button>
    </div>`);
  $('d-save').onclick = ()=>{
    ch.empty=false; ch.name=$('d-name').value; ch.freq=parseFreqMHz($('d-freq').value);
    ch.duplex=$('d-dup').value; ch.offset=ch.duplex==='split'?parseFreqMHz($('d-off').value):parseFloat($('d-off').value)*1e6;
    ch.tmode=$('d-tm').value; ch.ctone=ch.rtone=+$('d-tone').value; ch.power=$('d-pwr').value; ch.mode=$('d-mode').value;
    render(); toast('Channel saved','success');
  };
  $('d-del').onclick = ()=>{ Object.assign(ch,emptyChannel(ch.number)); closePanel(); render(); };
}

function render() {
  renderHeader();
  renderSidebar();
  renderMain();
  if (state.detailCh != null) {
    renderDetail();
    openDetailPanel();
  } else {
    closePanel();
  }
}

async function toggleConnect() {
  if (state.connected) {
    await state.serial.disconnect();
    state.serial = null;
    render();
    return;
  }
  if (!serialSupported()) {
    toast('Web Serial needs Chrome or Edge on desktop. You can still edit backups on mobile.', 'error');
    return;
  }
  try {
    await showConnectDialog();
  } catch (e) {
    if (e?.name !== 'NotFoundError' && e?.message !== 'cancelled') toast(e.message || String(e), 'error');
    state.serial = null;
    state.connected = false;
    render();
  }
}

async function connectToPort(port) {
  state.serial = new RadioSerial();
  await state.serial.openPort(port, state.model.baud);
  closePanel();
  toast('Connected on ' + state.model.baud + ' baud — now click Download from radio', 'success');
  render();
}

async function connectNewPort() {
  state.serial = new RadioSerial();
  await state.serial.connect(state.model.baud);
  closePanel();
  toast('Connected on ' + state.model.baud + ' baud — now click Download from radio', 'success');
  render();
}

async function showConnectDialog() {
  const ports = await RadioSerial.getAuthorizedPorts();
  if (!ports.length) {
    await connectNewPort();
    return;
  }
  state.detailCh = 'connect';
  render();
}

function initChannels() {
  state.channels = [];
  for (let i=0;i<state.model.channels;i++) state.channels.push(emptyChannel(i));
}

$('file-input').addEventListener('change', async e=>{
  const f=e.target.files[0]; if(!f) return;
  const buf=await f.arrayBuffer();
  if (e.target.dataset.mode==='csv') { state.channels=csvToChannels(new TextDecoder().decode(buf),state.model); toast('CSV imported','success'); }
  else loadImageFile(buf);
  e.target.value='';
  render();
});

injectStyles();
bindLayoutChrome();
initChannels();
render();

</script>
</body>
</html>
